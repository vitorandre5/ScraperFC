# Docker Compose for local development
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scraperfc_postgres
    environment:
      POSTGRES_USER: scraperfc
      POSTGRES_PASSWORD: scraperfc_dev
      POSTGRES_DB: scraperfc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraperfc"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scraperfc_api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
      DATABASE_URL: postgresql://scraperfc:scraperfc_dev@postgres:5432/scraperfc
      SYNC_INTERVAL_MINUTES: 5
      ENABLE_SOFASCORE: "true"
      ENABLE_FBREF: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./src:/app/src
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
